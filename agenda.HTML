<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda Personal Pro</title>
    <style>
        :root { --primary: #ff6b81; --secondary: #4a90e2; --bg: #f0f2f5; }
        body { font-family: "Segoe UI", sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .tabs { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 2px solid #eee; }
        .tab-btn { border: none; background: none; padding: 10px; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .section { display: none; }
        .section.active { display: block; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-direction: column; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 10px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .add-btn { background: var(--secondary); color: white; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .done { text-decoration: line-through; color: #888; background: #f9f9f9; }
        .failed { border-left: 5px solid #c62828; background: #fff5f5; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('tasks')">Diario</button>
        <button class="tab-btn" onclick="showSection('cycle')">Ciclo</button>
        <button class="tab-btn" onclick="showSection('dates')">Fechas</button>
    </div>

    <div id="tasks" class="section active">
        <h3>¿Qué harás hoy?</h3>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Escribe una tarea...">
            <button class="add-btn" onclick="addItem('tasks')">Añadir Tarea</button>
        </div>
        <div id="tasksList"></div>
    </div>

    <div id="cycle" class="section">
        <h3>🩸 Seguimiento de Ciclo</h3>
        <div class="input-group">
            <input type="date" id="cycleDate">
            <button class="add-btn" style="background:var(--primary)" onclick="addItem('cycle')">Registrar Inicio</button>
        </div>
        <div id="cycleList"></div>
    </div>

    <div id="dates" class="section">
        <h3>🔔 Fechas Importantes</h3>
        <div class="input-group">
            <input type="text" id="dateDesc" placeholder="¿Qué evento es?">
            <input type="date" id="dateVal">
            <button class="add-btn" onclick="addItem('dates')">Guardar Recordatorio</button>
        </div>
        <div id="datesList"></div>
    </div>
</div>

<script>
    // Base de Datos en LocalStorage (Requerimiento 2)
    var nombreBD = "agenda_db";
    var db = JSON.parse(localStorage.getItem(nombreBD)) || {
        tasks: [],
        cycle: [],
        dates: []
    };

    function saveDB() {
        localStorage.setItem(nombreBD, JSON.stringify(db));
    }

    window.onload = function() {
        Object.keys(db).forEach(function(tipo) {
            db[tipo].forEach(function(item) {
                renderUI(tipo, item);
            });
        });
    };

    function showSection(id) {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        event.currentTarget.classList.add("active");
    }

    function addItem(tipo) {
        var nuevoItem = { id: Date.now(), status: "" };
        
        if (tipo === "tasks") {
            var val = document.getElementById("taskInput").value;
            if (!val) return;
            nuevoItem.text = val;
            document.getElementById("taskInput").value = "";
        } 
        else if (tipo === "cycle") {
            var val = document.getElementById("cycleDate").value;
            if (!val) return;
            nuevoItem.text = "Periodo iniciado: " + val;
        } 
        else if (tipo === "dates") {
            var desc = document.getElementById("dateDesc").value;
            var fecha = document.getElementById("dateVal").value;
            if (!desc || !fecha) return;
            nuevoItem.text = desc + " (" + fecha + ")";
            document.getElementById("dateDesc").value = "";
            document.getElementById("dateVal").value = "";
        }

        db[tipo].push(nuevoItem);
        saveDB();
        renderUI(tipo, nuevoItem);
    }

    function renderUI(tipo, data) {
        var lista = document.getElementById(tipo + "List");
        var div = document.createElement("div");
        div.className = "list-item " + data.status;
        div.id = data.id;

        var contenido = "<span>" + data.text + "</span><div>";
        
        if (tipo === "tasks") {
            contenido += "<button onclick='updateStatus(" + data.id + ", \"done\")'>✓</button>";
            contenido += "<button onclick='updateStatus(" + data.id + ", \"failed\")'>X</button>";
        }
        
        contenido += "<button onclick='deleteItem(\"" + tipo + "\", " + data.id + ")' style='color:red'>🗑️</button></div>";
        
        div.innerHTML = contenido;
        lista.appendChild(div);
    }

    function updateStatus(id, estado) {
        var tarea = db.tasks.find(t => t.id == id);
        if (tarea) {
            tarea.status = estado;
            saveDB();
            document.getElementById(id).className = "list-item " + estado;
        }
    }

    function deleteItem(tipo, id) {
        db[tipo] = db[tipo].filter(i => i.id != id);
        saveDB();
        document.getElementById(id).remove();
    }
</script>

</body>
</html>
